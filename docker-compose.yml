services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mh_schemes_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      SUPERUSER_PASSWORD: superuser123
      VIEW_COMPILED_PATH: /tmp/laravel/framework/views
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: mh_schemes_nginx
    ports:
      - "8099:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: mh_schemes_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: schemes_db
      MYSQL_USER: schemes_user
      MYSQL_PASSWORD: schemes_pass
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  node:
    image: node:22-alpine
    container_name: mh_schemes_node
    working_dir: /var/www
    command: sh -c "npm install && npm run dev"
    ports:
      - "5175:5173"
    volumes:
      - ./:/var/www
      - node_modules:/var/www/node_modules
    depends_on:
      - app

volumes:
  db_data:
  node_modules:
